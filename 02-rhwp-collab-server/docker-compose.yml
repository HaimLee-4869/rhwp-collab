version: '3.8'

services:
  rhwp-collab:
    build: .
    container_name: rhwp-collab
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8765/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
